# Mouse
set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Enable extended keys for Alt+Arrow recognition (tmux 3.7a + Windows Terminal)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# History
set -g history-limit 100000

# Windows start at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Split
bind s split-window -v
bind v split-window -h

# Navigation
bind -r Left  select-pane -L
bind -r Right select-pane -R
bind -r Up    select-pane -U
bind -r Down  select-pane -D

# Switch windows with Alt+arrow (no prefix needed)
bind -n M-Left  previous-window
bind -n M-Right next-window

# Prevent escape sequence leaking in Windows Terminal
set -sg escape-time 500
set -g focus-events off

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded!"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'ofirgall/tmux-window-name'
set -g @plugin 'b0o/tmux-autoreload'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'sainnhe/tmux-fzf'
set-environment -g TMUX_FZF_LAUNCH_KEY "f"
set -g @tmux-autoreload-configs '~/.config/tmux/tmux.conf'

# Config
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_left_separator  ""
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_date_time_text " %a %h-%d %H:%M"

run ~/.config/tmux/themes/catppuccin/tmux/catppuccin.tmux

# Custom modules (GPU, VRAM)
%hidden MODULE_NAME="gpu"
source -F ~/.config/tmux/gpu.conf
%hidden MODULE_NAME="gram"
source -F ~/.config/tmux/gram.conf

# Prefix highlight
set -g @prefix_highlight_fg '#1e1e2e'
set -g @prefix_highlight_bg '#f38ba8'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=#1e1e2e,bg=#a6e3a1,bold'

# Status bar
set -g status-right-length 100
set -g status-left-length 100
setw -g window-status-separator ""
set -g status-left "#{E:@catppuccin_status_directory} "
set -g status-right "#{prefix_highlight} "
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -agF status-right "#{E:@catppuccin_status_gpu}"
set -agF status-right "#{E:@catppuccin_status_gram}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

run '~/.config/tmux/plugins/tpm/tpm'
