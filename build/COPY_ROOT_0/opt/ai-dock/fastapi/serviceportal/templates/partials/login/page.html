<main id="login">
    <div id="form-container">
      <div class="theme-toggle-login">
        <a href="#" onclick="toggleTheme(); return false;" title="Alternar tema">
          <i id="theme-icon" class="fa-solid fa-moon"></i>
        </a>
      </div>
      <img
        id="logo"
        alt="ai-dock logo"
        src="https://res.cloudinary.com/dnijlgpto/image/upload/f_auto,q_auto/v1/ai-dock/ic9zjqumz0cnakr6zzey?utm_content={{urlslug}}&utm_source={{cloud}}"
    />
        <form method="post">
            <div class="form-group">
                <label for="user">Username</label>
                <input type="text" id="user" name="user" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Log In</button>
        </form>
    </div>
</main>
