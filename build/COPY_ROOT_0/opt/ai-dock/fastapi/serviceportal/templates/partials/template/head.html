<script src="https://unpkg.com/htmx.org@1.9.10"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/modern-css-reset/dist/reset.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik&family=Ubuntu+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.4.2/css/all.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
    (function() {
        try {
            var saved = localStorage.getItem('theme');
            if (saved === 'dark' || saved === null) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        } catch(e) {}
    })();
</script>

<style>
    /* ===== THEME VARIABLES ===== */
    :root {
        /* Light theme (default) */
        --bg: #ffffff;
        --bg-alt: #F2F2F2;
        --text: #333333;
        --text-light: #888888;
        --accent: #485e82;
        --accent-hover: #5a7ab5;
        --border: #ccc;
        --border-light: #eee;
        --card-bg: #ffffff;
        --login-shadow: rgba(0,0,0,0.1);
        --login-border: #ccc;
        --stripe-bg: #000;
        --terminal-bg: #000;
        --terminal-text: #fafafa;
        --tail-header: #888888;
        --error-text: #ED4337;
        --warning-text: #FFBF00;
        --info-text: #485e82;
        --nav-hover: rgba(72, 94, 130, 0.5);
        --nav-active: rgba(72, 94, 130, 1);
        --message-error: #D0342C;
        --footer-text: #333333;
    }

    [data-theme="dark"] {
        --bg: #121212;
        --bg-alt: #1e1e2e;
        --text: #e0e0e0;
        --text-light: #999999;
        --accent: #5a7ab5;
        --accent-hover: #7a9ad5;
        --border: #444;
        --border-light: #2a2a2a;
        --card-bg: #1a1a1a;
        --login-shadow: rgba(0,0,0,0.5);
        --login-border: #444;
        --stripe-bg: #000;
        --terminal-bg: #000;
        --terminal-text: #e0e0e0;
        --tail-header: #666666;
        --error-text: #ff6b5a;
        --warning-text: #ffc107;
        --info-text: #7a9ad5;
        --nav-hover: rgba(90, 122, 181, 0.4);
        --nav-active: rgba(90, 122, 181, 1);
        --message-error: #ff6b5a;
        --footer-text: #aaaaaa;
    }

    /* ===== BASE LAYOUT ===== */
    :root {
        font-size: 16px;
    }
    body {
        font-family: 'Rubik', sans-serif;
        color: var(--text);
        background-color: var(--bg);
        padding: 0;
        margin: 0;
        transition: background-color 0.3s ease, color 0.3s ease;
    }
    a, a:visited {
        color: inherit;
        text-decoration: none;
    }

    /* ===== STRIPE (top bar) ===== */
    #stripe {
        position: fixed;
        z-index: 1000;
        display: grid;
        justify-items: center;
        align-items: center;
        top: 0;
        width: 100%;
        background: var(--stripe-bg);
    }
    .one-row {
        position: relative;
        width: 1920px;
        max-width: 94vw;
        display: grid;
        align-items: center;
        justify-items: center;
        padding: 8px 5px 0 5px;
    }
    ul#github-buttons {
        margin: 0;
        padding: 0;
    }
    ul#github-buttons li {
        list-style: none;
        margin-right: 10px;
        display: inline-block;
    }

    /* ===== MAIN COLUMN ===== */
    .one-col {
        display: grid;
        width: 1920px;
        max-width: 94vw;
        grid-template-columns: 1fr;
        justify-items: center;
        margin: 5px auto;
        padding: 40px 5px 5px 5px;
    }

    /* ===== NAVBAR ===== */
    .Navbar {
        width: 100%;
        display: flex;
        padding: 16px 0;
        font-family: sans-serif;
        justify-content: center;
        position: relative;
    }
    .Navbar__Link {
        margin-right: 8px;
        border-bottom: 2px solid transparent;
        transition: border 100ms ease-in;
    }
    nav .Navbar__Link.active, .Navbar__Link.active:hover {
        border-bottom: 2px solid var(--nav-active);
    }
    nav .Navbar__Link:hover {
        border-bottom: 2px solid var(--nav-hover);
    }
    .Navbar__Items {
        display: flex;
    }
    .Navbar__Items--right {
        margin-left: auto;
    }
    .Navbar__Link-toggle {
        display: none;
    }

    /* Theme toggle button */
    .theme-toggle {
        margin-left: auto;
        cursor: pointer;
        padding: 0 4px;
    }
    .theme-toggle a {
        border-bottom: none !important;
        font-size: 1.2rem;
    }
    .theme-toggle a:hover {
        border-bottom: none !important;
    }
    .theme-toggle .fa-moon {
        color: #f0c040;
    }
    .theme-toggle .fa-sun {
        color: #f0c040;
    }

    @media only screen and (max-width: 768px) {
        .Navbar__Items,
        .Navbar {
            flex-direction: column;
        }
        .Navbar__Items {
            display: none;
        }
        .Navbar__Items--right {
            margin-left: 0;
        }
        .Navbar__ToggleShow {
            display: flex;
        }
        nav .Navbar__Link {
            border-bottom: none;
            margin: 2px 0;
            padding-left: 6px;
            border-left: 2px solid transparent;
        }
        nav .Navbar__Link.active {
            border-bottom: none;
            border-left: 2px solid var(--nav-active);
        }
        nav .Navbar__Link.active, .Navbar__Link.active:hover {
            border-bottom: none;
        }
        nav .Navbar__Link:hover {
            border-bottom: none;
        }
        .Navbar__Link-toggle {
            align-self: flex-end;
            display: initial;
            position: absolute;
            top: 16px;
            cursor: pointer;
        }
        .theme-toggle {
            margin-left: 0;
            align-self: flex-end;
            padding: 4px 6px;
        }
    }

    /* ===== LOGO ===== */
    img#logo {
        height: 50px;
        width: 150px;
        object-fit: contain;
    }
    img.htmx-indicator {
        display: inline;
    }

    /* ===== MESSAGE ===== */
    div.message {
        padding: 5px;
        text-align: center;
    }
    .fa-triangle-exclamation {
        margin: 10px 0;
        color: var(--message-error);
    }

    /* ===== HEADINGS ===== */
    h1, h2 {
        justify-self: left;
        font-size: 1.1rem;
        padding: 0;
        margin: 10px 0;
    }
    .fa-link, .fa-repeat {
        color: var(--accent);
        margin-right: 3px;
    }

    /* ===== PAGE CONTENT ===== */
    div#page {
        width: 100%;
    }
    div#page h1 {
        display: flex;
        align-items: center;
    }
    div#page img#spinner-page {
        padding-left: 5px;
        height: 1.6rem;
    }

    /* ===== SERVICE LIST ===== */
    main#service-list {
        display: grid;
        width: 100%;
        grid-template-columns: 1fr;
        margin: 10px 0 20px 0;
        border-radius: 5px;
        overflow: hidden;
    }
    main#service-list div.row {
        display: grid;
        width: 100%;
        grid-template-columns: 1fr 2fr 2fr;
        justify-items: left;
        align-items: center;
    }
    main#service-list div.row:nth-of-type(odd) {
        background: var(--bg-alt);
    }
    main#service-list div.row div {
        padding: 5px;
    }
    main#service-list div.heading {
        font-weight: bold;
        padding-bottom: 10px;
    }
    main#service-list ul {
        margin: 0;
        padding: 0;
    }
    main#service-list ul li {
        list-style: none;
        padding-bottom: 5px;
    }
    main#service-list ul li a {
        border-bottom: 1px solid transparent;
        transition: border 100ms ease-in;
    }
    main#service-list ul li a:hover {
        border-bottom: 1px solid var(--accent);
    }
    main#service-list ul li a.icon:hover {
        border-bottom: 1px solid transparent;
    }

    /* ===== PROCESS LIST ===== */
    main#process-list {
        display: grid;
        width: 100%;
        grid-template-columns: 1fr;
        margin: 10px 0 20px 0;
        border-radius: 5px;
        overflow: hidden;
    }
    main#process-list div.row {
        display: grid;
        width: 100%;
        grid-template-columns: 5fr 3fr 4fr;
        justify-items: left;
        align-items: center;
    }
    main#process-list div.row:nth-of-type(odd) {
        background: var(--bg-alt);
    }
    main#process-list div.row div {
        padding: 5px;
    }
    main#process-list div.row div.controls {
        width: 100%;
    }
    main#process-list div.row div.controls a,
    main#process-list div.row div.controls a:visited {
        margin-right: 5px;
        border-bottom: 1px solid transparent;
        transition: border 100ms ease-in;
    }
    main#process-list div.row div.controls a:hover,
    main#process-list div.row div.controls a:focus,
    main#process-list div.row div.controls a:visited {
        border-bottom: 1px solid var(--accent);
    }
    main#process-list div.heading {
        font-weight: bold;
        padding-bottom: 10px;
    }
    main#process-list ul {
        margin: 0;
        padding: 0;
    }
    main#process-list ul li {
        list-style: none;
        padding-bottom: 5px;
    }
    main#process-list .statename {
        display: flex;
        align-items: center;
    }
    main#process-list .statename img.htmx-indicator {
        padding-left: 5px;
        height: 20px;
    }

    /* ===== TERMINAL (Log Viewer) ===== */
    main#terminal {
        position: relative;
        box-sizing: border-box;
        justify-self: left;
        margin: 5px 0;
        padding: 10px 10px 20px 10px;
        width: 100%;
        height: 500px;
        min-height: 50vh;
        max-height: 80vh;
        background: var(--terminal-bg);
        font-family: 'Ubuntu Mono', monospace;
        word-break: break-all;
        color: var(--terminal-text);
        line-height: 1.5;
        overflow-y: scroll;
        border-radius: 5px;
    }
    main#terminal .error {
        color: var(--error-text);
    }
    main#terminal .warning {
        color: var(--warning-text);
    }
    main#terminal .info {
        color: var(--info-text);
    }
    main#terminal .tail-header {
        color: var(--tail-header);
    }
    main#terminal * {
        overflow-anchor: none;
    }
    main#terminal #anchor {
        overflow-anchor: auto;
        height: 1px;
    }

    /* ===== ABOUT SECTION ===== */
    section#about {
        justify-self: left;
        width: 100%;
        padding-bottom: 25px;
        border-bottom: 1px solid var(--border-light);
    }
    section#about p {
        margin: 0 0 10px 0;
    }
    section#about a, section#about a:visited {
        font-style: italic;
    }

    /* ===== FOOTER ===== */
    footer {
        display: flex;
        flex-direction: column;
        text-align: center;
        align-items: center;
        justify-self: center;
        font-family: 'Rubik', sans-serif;
        padding-top: 10px;
        color: var(--footer-text);
    }
    footer #support-dev {
        margin: 20px 0;
        max-width: 95vw;
    }
    footer #support-dev summary:hover {
        cursor: pointer;
    }
    footer #support-dev ul.unstyled {
        list-style: none;
        padding: 0;
    }
    footer #support-dev ul.unstyled li {
        padding: 3px;
        word-break: break-all;
    }
    footer p {
        text-align: center;
        margin: 15px 0;
    }
    footer ul#social-buttons {
        list-style: none;
        text-align: center;
        margin: 0;
        padding: 0;
    }
    footer ul#social-buttons li {
        display: inline-block;
        margin: 0 5px;
    }
    footer ul#social-buttons li img {
        height: 30px;
        width: 30px;
    }

    /* ===== FOOTER SPONSOR BOARD (inline style converted) ===== */
    footer #sponsor-board {
        max-width: 95vw;
        display: flex;
        flex-direction: column;
    }
    footer #sponsor-board .sponsors {
        display: flex;
        justify-content: center;
    }
    footer #sponsor-board .sponsor {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        margin: 0 15px;
    }
    footer #sponsor-board .sponsor-logo {
        max-width: 75px;
        max-height: 75px;
        border-radius: 50%;
    }
    footer #sponsor-board .sponsor-name {
        font-size: 0.8rem;
    }

    /* ===== LOGIN PAGE ===== */
    /* ===== LOGIN PAGE THEME TOGGLE ===== */
    .theme-toggle-login {
        position: absolute;
        top: 10px;
        right: 10px;
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
    }
    .theme-toggle-login a {
        color: var(--text-light);
        border-bottom: none !important;
    }
    .theme-toggle-login a:hover {
        color: var(--accent);
    }
    .theme-toggle-login .fa-moon {
        color: #f0c040;
    }
    .theme-toggle-login .fa-sun {
        color: #f0c040;
    }
    #form-container {
        position: relative;
    }
    #login #form-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 600px;
        max-width: 90vw;
        margin: 0 auto;
        background-color: var(--card-bg);
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px var(--login-shadow);
        border: 1px solid var(--login-border);
        transition: background-color 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }
    #login #form-container img {
        margin-bottom: 20px;
    }
    #login form {
        justify-self: center;
        width: 100%;
    }
    #login .form-group {
        margin-bottom: 20px;
    }
    #login label {
        display: block;
        font-weight: bold;
    }
    #login input[type="text"],
    #login input[type="password"] {
        width: 100%;
        padding: 10px;
        border: 1px solid var(--login-border);
        border-radius: 5px;
        background-color: var(--bg);
        color: var(--text);
        transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
    }
    #login button {
        width: 100%;
        background-color: #333;
        color: #fff;
        border: none;
        padding: 10px 20px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        border-radius: 5px;
    }
    #login button:hover {
        background-color: #444;
    }
</style>
<script async defer src="https://buttons.github.io/buttons.js"></script>
<title>{{ title }}</title>
